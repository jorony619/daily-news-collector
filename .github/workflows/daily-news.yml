name: 每日出版印刷行业动态收集

on:
  schedule:
    - cron: '0 1 * * *'  # 北京时间每天9点自动运行
  workflow_dispatch:      # 支持手动触发

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤1: 检出代码
      - name: 检出仓库代码
        uses: actions/checkout@v3
          
      # 步骤2: 设置Python环境
      - name: 设置Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      # 步骤3: 安装Python依赖
      - name: 安装依赖包
        run: |
          pip install requests feedparser beautifulsoup4 lxml
          
      # 步骤4: 运行数据收集脚本
      - name: 收集行业资讯
        run: |
          echo "===== 开始收集数据 ====="
          
          # 创建输出目录
          mkdir -p daily-reports
          
          # 收集RSS数据
          python daily-news-collector/scripts/collect_feeds.py \
            --config sources.json \
            --output raw_feeds.json
            
          # 收集网页数据
          python daily-news-collector/scripts/collect_webpages.py \
            --url https://whattheythink.com/news/ \
            --output web_data.json
          
          # 生成日报
          python generate_report.py
          
          echo "===== 数据收集完成 ====="
          
      # 步骤5: 提交日报到仓库
      - name: 提交日报
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily-reports/*.md
          git diff --staged --quiet || git commit -m "📊 每日日报更新 $(date +%Y-%m-%d)"
          git push
          
      # 步骤6: 发送日报邮件（包含完整内容）
      - name: 发送日报邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "📊 出版印刷行业日报 - $(date +%Y-%m-%d)"
          to: qian.chen@twedutech.com
          from: GitHub Actions
          body: |
            您好！
            
            今日的出版印刷行业动态日报已生成完成。
            
            📅 日期：$(date +%Y-%m-%d)
            
            ---
            
            请查看下方完整日报内容：
            
            $(cat daily-reports/daily-news-report-$(date +%Y-%m-%d).md)
            
            ---
            
            📌 日报归档链接：https://github.com/${{ github.repository }}/blob/main/daily-reports/daily-news-report-$(date +%Y-%m-%d).md
            
            此邮件由GitHub Actions自动发送。
          priority: high
          convert_markdown: true
