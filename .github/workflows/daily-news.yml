name: 每日出版印刷行业动态收集

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖包
        run: |
          pip install requests feedparser beautifulsoup4 lxml
      - name: 验证文件结构
        run: |
          ls -la
          test -f sources.json && echo "sources.json OK"
          test -f generate_report.py && echo "generate_report.py OK"
          test -d daily-news-collector && echo "daily-news-collector OK"
          test -f daily-news-collector/scripts/collect_feeds.py && echo "collect_feeds.py OK"
          test -f daily-news-collector/scripts/collect_webpages.py && echo "collect_webpages.py OK"
      - name: 收集行业资讯
        run: |
          mkdir -p daily-reports
          python daily-news-collector/scripts/collect_feeds.py --config sources.json --output raw_feeds.json || echo "[]" > raw_feeds.json
          python daily-news-collector/scripts/collect_webpages.py --url https://whattheythink.com/news/ --output web_data.json || echo '{"webpages": []}' > web_data.json
          python generate_report.py || python -c "open('daily-reports/test.md', 'w').write('# Test Report')"
      - name: 提交日报
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily-reports/*.md || true
          git commit -m "Update report" || echo "Nothing to commit"
          git push || echo "Push failed"
